name: PlayConsultantPlugin
version: '${version}'

main: eu.bruza.vojtech.playConsultantPlugin.PlayConsultantPlugin
api-version: '1.21.4'
load: POSTWORLD

authors: [ Vojtech Bruza ]

commands:
  megaphone:
    description: Gives the player a megaphone.
  removecomment:
    description: Removes the nearest comment marker and its hologram (admin only).
  reloadconfig:
    description: Reloads PlayConsultantPlugin configuration from disk.
  resetplayerdata:
    description: Resets a specific player's data (admin only).
  creativekey:
    description: Gives the player a new Creative Key if they have unlocked it.

depend: [DecentHolograms, PlotSquared, FastAsyncWorldEdit]

permissions:
  playconsultant.removecomment:
    description: Allows removing nearby comments
    default: op
  playconsultant.reloadconfig:
    description: Allows reloading the plugin configuration
    default: op
  playconsultant.resetplayerdata:
    description: Allows resetting player data
    default: op
