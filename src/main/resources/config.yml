worlds:
  # The name of the main adventure world.
  adventure-world-name: 'world'
  # The name of the creative build world.
  build-world-name: 'creative_plot'

comments:
  # Minimum number of words a player must type before a comment is accepted.
  min-word-count: 8

  # How close a player can be to their previous comment before the megaphone blocks a new one.
  min-comment-distance: 30.0

  # How many valid comments are needed before the creative key is granted.
  creative-unlock-comment-count: 5

  # Creative plot settings for when players unlock the build world
  creative-plot:
    # Name of the schematic to load when a player is assigned a plot
    # The schematic should be located in the PlotSquared schematics folder
    schematic-name: 'city_block'

  # List of mobs that can spawn when a comment is created.
  # Weight is the spawn probability weight (higher = more common).
  # Keep ALLAY as the default/common mob; rarer mobs have much lower weights.
  # y-offset adjusts the spawn height for the mob.
  # gravity controls whether the entity falls / stands on the ground.
  mobs:
    - mob: ALLAY
      weight: 20
      y-offset: 0.5
      gravity: false

    # Common passive mobs
    - mob: SHEEP
      weight: 10
      y-offset: 0.0
      gravity: true
    - mob: CHICKEN
      weight: 9
      y-offset: 0.0
      gravity: true
    - mob: COW
      weight: 9
      y-offset: 0.0
      gravity: true
    - mob: PIG
      weight: 8
      y-offset: 0.0
      gravity: true
    - mob: RABBIT
      weight: 8
      y-offset: 0.0
      gravity: true

    # Uncommon mobs
    - mob: CAT
      weight: 7
      y-offset: 0.0
      gravity: true
    - mob: FOX
      weight: 6
      y-offset: 0.0
      gravity: true
    - mob: BEE
      weight: 6
      y-offset: 0.5
      gravity: true
    - mob: HORSE
      weight: 5
      y-offset: 0.0
      gravity: true
    - mob: DONKEY
      weight: 5
      y-offset: 0.0
      gravity: true
    - mob: MULE
      weight: 4
      y-offset: 0.0
      gravity: true
    - mob: LLAMA
      weight: 4
      y-offset: 0.0
      gravity: true
    - mob: WOLF
      weight: 4
      y-offset: 0.0
      gravity: true
    - mob: PARROT
      weight: 3
      y-offset: 0.5
      gravity: false

    # Rare mobs
    - mob: TURTLE
      weight: 3
      y-offset: 0.0
      gravity: true
    - mob: OCELOT
      weight: 3
      y-offset: 0.0
      gravity: true
    - mob: GOAT
      weight: 3
      y-offset: 0.0
      gravity: true
    - mob: PANDA
      weight: 2
      y-offset: 0.0
      gravity: true
    - mob: POLAR_BEAR
      weight: 2
      y-offset: 0.0
      gravity: true
    - mob: MOOSHROOM
      weight: 2
      y-offset: 0.0
      gravity: true
    - mob: CAMEL
      weight: 2
      y-offset: 0.0
      gravity: true

    # Ultra-rare special mobs
    - mob: ARMADILLO
      weight: 1
      y-offset: 0.0
      gravity: true
    - mob: SNIFFER
      weight: 1
      y-offset: 0.0
      gravity: true

commands:
  removecomment:
    # Search radius for finding the nearest comment marker.
    search-radius: 5.0